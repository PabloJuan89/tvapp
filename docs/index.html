<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV EN VIVO</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

header{
    background:#000;
    padding:15px;
    text-align:center;
    font-size:26px;
    font-weight:bold;
}

#player{
    width:100%;
    background:black;
}

iframe{
    width:100%;
    height:240px;
    border:none;
}

#channels{
    padding:10px;
}

.channel{
    background:#222;
    margin-bottom:10px;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
}

.channel img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.info{
    padding:12px;
}

.name{
    font-size:18px;
    font-weight:bold;
}

.type{
    color:#aaa;
    margin-top:5px;
}

</style>

</head>

<body>

<header>
TV EN VIVO
</header>

<div id="player"></div>

<div id="channels"></div>

<script>

const API = "https://ofutbol.jdoxx.com/api/shedule/UOLWyiSt6WI1ngmppPVHLi8ERLxTml";

fetch(API)

.then(r => r.json())

.then(data => {

    console.log(data);

    const channels = data.shedule;

    const container = document.getElementById("channels");

    container.innerHTML = "";

    channels.forEach(ch => {

        const div = document.createElement("div");

        div.className = "channel";

        div.innerHTML = `

            <img src="${ch.photo}" />

            <div class="info">

                <div class="name">
                    ${ch.name}
                </div>

                <div class="type">
                    ${ch.type}
                </div>

            </div>

        `;

        div.onclick = () => {

            let url = "";

            if(ch.play["player-1"]){

                url = ch.play["player-1"];

            }

            else if(ch.play["player-2"]){

                url = ch.play["player-2"];

            }

            if(url){

                document.getElementById("player").innerHTML = `

                    <iframe
                        src="${url}"
                        allowfullscreen
                        allow="autoplay; fullscreen"
                    ></iframe>

                `;

                window.scrollTo(0,0);

            }

        };

        container.appendChild(div);

    });

})

.catch(err => {

    document.getElementById("channels").innerHTML = `
        <pre style="color:red;">
${err}
        </pre>
    `;

});

</script>

</body>

</html>
