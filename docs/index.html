<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV EN VIVO</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

header{
    background:black;
    padding:15px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

#player iframe{
    width:100%;
    height:250px;
    border:none;
    background:black;
}

#channels{
    padding:10px;
}

.channel{
    background:#222;
    margin-bottom:12px;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
}

.channel img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.info{
    padding:12px;
}

.name{
    font-size:18px;
    font-weight:bold;
}

.type{
    color:#aaa;
    margin-top:5px;
}

</style>

</head>

<body>

<header>
TV EN VIVO
</header>

<div id="player"></div>

<div id="channels">
Cargando...
</div>

<script>

const API = "https://ofutbol.jdoxx.com/api/shedule/UOLWyiSt6WI1ngmppPVHLi8ERLxTml";

fetch(API)

.then(res => res.json())

.then(data => {

    console.log(data);

    const container = document.getElementById("channels");

    container.innerHTML = "";

    if(!data.shedule){

        container.innerHTML = `
            <pre style="color:red;">
No se encontraron canales.

${JSON.stringify(data,null,2)}
            </pre>
        `;

        return;

    }

    const partidos = data.shedule;

    partidos.forEach(item => {

        const card = document.createElement("div");

        card.className = "channel";

        let img = item.photo;

        if(!img || img == "N/A"){

            img = "https://via.placeholder.com/500x300?text=TV";

        }

        card.innerHTML = `

            <img src="${img}">

            <div class="info">

                <div class="name">
                    ${item.name || "Canal"}
                </div>

                <div class="type">
                    ${item.type || ""}
                </div>

            </div>

        `;

        card.onclick = () => {

            let link = "";

            if(item.play && item.play["player-1"]){

                link = item.play["player-1"];

            }

            else if(item.play && item.play["player-2"]){

                link = item.play["player-2"];

            }

            if(link){

                document.getElementById("player").innerHTML = `

                    <iframe
                        src="${link}"
                        allowfullscreen
                        allow="autoplay"
                    ></iframe>

                `;

                window.scrollTo({
                    top:0,
                    behavior:"smooth"
                });

            }

            else{

                alert("Stream no disponible");

            }

        };

        container.appendChild(card);

    });

})

.catch(error => {

    console.log(error);

    document.getElementById("channels").innerHTML = `
        <pre style="color:red;">
${error}
        </pre>
    `;

});

</script>

</body>
</html>
