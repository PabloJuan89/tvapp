<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV EN VIVO</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

header{
    background:#000;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

#player{
    width:100%;
    background:black;
}

video{
    width:100%;
    height:auto;
    background:black;
}

iframe{
    width:100%;
    height:250px;
    border:none;
}

#channels{
    padding:10px;
}

.channel{
    background:#222;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
    transition:0.2s;
}

.channel:hover{
    background:#333;
}

.loading{
    text-align:center;
    padding:20px;
}

</style>

</head>

<body>

<header>
TV EN VIVO
</header>

<div id="player"></div>

<div id="channels">
<div class="loading">
Cargando canales...
</div>
</div>

<script>

const API = "https://ofutbol.jdoxx.com/api/shedule/UOLWyiSt6WI1ngmppPVHLi8ERLxTml";

fetch(API)

.then(response => response.json())

.then(data => {

    console.log(data);

    const channelsDiv = document.getElementById("channels");

    channelsDiv.innerHTML = "";

    if(Array.isArray(data)){

        data.forEach(channel => {

            const div = document.createElement("div");

            div.className = "channel";

            div.innerHTML = `
                📺 ${channel.name || "Canal"}
            `;

            div.onclick = () => {

                console.log(channel);

                if(channel.url){

                    document.getElementById("player").innerHTML = `
                        <video
                            src="${channel.url}"
                            controls
                            autoplay
                        ></video>
                    `;

                }

                else if(channel.embed){

                    document.getElementById("player").innerHTML = `
                        <iframe
                            src="${channel.embed}"
                            allowfullscreen
                        ></iframe>
                    `;

                }

                else{

                    alert("No se encontró stream");

                }

            };

            channelsDiv.appendChild(div);

        });

    }

    else{

        channelsDiv.innerHTML = `
            <pre style="white-space:pre-wrap;color:red;">
${JSON.stringify(data,null,2)}
            </pre>
        `;

    }

})

.catch(error => {

    console.log(error);

    document.getElementById("channels").innerHTML = `
        <pre style="color:red;">
${error}
        </pre>
    `;

});

</script>

</body>
</html>
